baseURL: "https://yajw.org/"
title: "My Writing Space"
languageCode: "zh-cn"

module:
  imports:
    - path: github.com/adityatelange/hugo-PaperMod

params:
  description: "我的写作空间"
  author: "yajw"

  # PaperMod 主题参数（注意大小写）
  ShowReadingTime: true
  ShowShareButtons: false
  ShowToc: true
  TocOpen: false
  ShowPostNavLinks: true
  ShowCodeCopyButtons: true
  ShowBreadCrumbs: true

  # 主题模式：auto 跟随系统（可选 light / dark）
  defaultTheme: "auto"

  # 社交图标
  socialIcons:
    - name: "github"
      url: "https://github.com/yajw"

menu:
  main:
    - name: "首页"
      url: "/"
      weight: 1
    - name: "归档"
      url: "/archives/"
      weight: 2
    - name: "关于"
      url: "/about/"
      weight: 3

markup:
  highlight:
    style: "github-dark"
    noClasses: false

taxonomies:
  tag: "tags"
  category: "categories"
